<template name='layout'>
    {{> yield 'header'}}

    {{> yield}}

    {{> yield 'footer'}}
</template>

<template name='header'>
    <header>
        <nav class='navbar navbar-inverse navbar-fixed-top' role='navigation'>
            <div class="container">
                <div class="navbar-header">
                    <button type="button" class="navbar-toggle collapsed" data-toggle="collapse" data-target="#navbar" aria-expanded="false" aria-controls="navbar">
                        <span class="sr-only">Toggle navigation</span>
                        <span class="icon-bar"></span>
                        <span class="icon-bar"></span>
                        <span class="icon-bar"></span>
                    </button>
                    <a href="/" class="navbar-left"><img src="/logo.png"></a>
                </div>
                <div id="navbar" class="navbar-collapse collapse">
                    <ul class="nav nav-pills">
                        <li><a href="{{pathFor route='about'}}">About</a></li>
                        <li class="dropdown">
                            <a class="dropdown-toggle" data-toggle="dropdown">Admin<span class="caret"></span></a>
                            <ul class="dropdown-menu">
                                {{#if currentUser}}
                                <li><a href="#" class="disabled">Login</a></li>
                                <li><a href="#" class="logout">Logout</a></li>
                                <li><a href="#" class="disabled">Register</a></li>
                                {{else}}
                                <li><a href="{{pathFor route='login'}}">Login</a></li>
                                <li><a href="#" class='disabled'>Logout</a></li>
                                <li><a href="{{pathFor route='register'}}">Register</a></li>
                                {{/if}}
                            </ul>
                        </li>
                        <li><a href="{{pathFor route='blog'}}">Blog</a></li>
                        <li><a href="{{pathFor route='contact'}}">Contact</a></li>
                        <li class="dropdown">
                            <a class="dropdown-toggle" data-toggle="dropdown">Events<span class="caret"></span></a>
                            <ul class="dropdown-menu">
                                <li><a href="{{pathFor route='liturgies'}}">Liturgies</a></li>
                                <li><a href="{{pathFor route='meetings'}}">Meetings</a></li>
                                <li><a href="{{pathFor route='socials'}}">Socials</a></li>
                            </ul>
                        </li>
                        <li class="dropdown">
                            <a class="dropdown-toggle" data-toggle="dropdown">Resources<span class="caret"></span></a>
                            <ul class="dropdown-menu" role="menu">
                                <li><a href="{{pathFor route='agendaeMinutes'}}">Agendae/Minutes</a></li>
                                <li><a href="{{pathFor route='biddingPrayers'}}">BiddingPrayers</a></li>
                                <li><a href="{{pathFor route='newsletters'}}">Liturgies</a></li>
                                <li><a href="{{pathFor route='music'}}">Music</a></li>
                                <li><a href="{{pathFor route='rotas'}}">Rotas</a></li>
                            </ul>
                        </li>
                        <li><a href="{{pathFor route='search'}}">Search</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>
</template>

<template name="footer">
    <footer>
        <div class="container">
            <p>Copyright &copy; Iford Parish, 2014-2016. Built with ROCKS, a Meteorjs app developed by Fr Darryl Jordan.</p>
        </div>
    </footer>
</template>

<template name="loading">
    <div class="container">
        <h1>Loading...</h1>
    </div>
</template>

<template name="notFound">
    <div class="container">
        <h1>Not Found</h1>
    </div>
</template>
