<template name='header'>
    <nav class='navbar navbar-inverse navbar-fixed-top' role='navigation'>
        <div class="container">
            <div class="navbar-header">
                <button type="button" class="navbar-toggle collapsed" data-toggle="collapse" data-target="#navbar" aria-expanded="false" aria-controls="navbar">
                    <span class="sr-only">Toggle navigation</span>
                    <span class="icon-bar"></span>
                    <span class="icon-bar"></span>
                    <span class="icon-bar"></span>
                </button>
                <a href="#" class="navbar-left"><img src="/logo.png"></a>
            </div>
            <div id="navbar" class="navbar-collapse collapse">
                <ul class="nav nav-pills">
                    <li>{{#linkTo route='home'}}Home{{/linkTo}}</li>
                    <li>{{#linkTo route='about'}}About{{/linkTo}}</li>
                    <li>{{#linkTo route='blog'}}Blog{{/linkTo}}</li>
                    <li>{{#linkTo route='contact'}}Contact{{/linkTo}}</li>
                    <li class="dropdown">
                        <a class="dropdown-toggle" data-toggle="dropdown">Events<span class="caret"></span></a>
                        <ul class="dropdown-menu">
                            <li>{{#linkTo route='liturgyEvents'}}Liturgies{{/linkTo}}</li>
                            <li>{{#linkTo route='meetingEvents'}}Meetings{{/linkTo}}</li>
                            <li>{{#linkTo route='socialEvents'}}Socials{{/linkTo}}</li>
                        </ul>
                    </li>
                    <li class="dropdown">
                        <a class="dropdown-toggle" data-toggle="dropdown">Resources<span class="caret"></span></a>
                        <ul class="dropdown-menu" role="menu">
                            <li>{{#linkTo route='newsletterResources'}}Newsletters{{/linkTo}}</li>
                            <li>{{#linkTo route='meetingResources'}}Meeting Agendae/Minutes{{/linkTo}}</li>
                            <li>{{#linkTo route='musicResources'}}Music{{/linkTo}}</li>
                            <li>{{#linkTo route='rotaResources'}}Rotas{{/linkTo}}</li>
                        </ul>
                    </li>
                    <li>{{#linkTo route='search'}}Search{{/linkTo}}</li>
                  {{#if currentUser}}
                    <li><a href="#" class="logout">Logout</a></li>
                  {{else}}
                    <li>{{#linkTo route='register'}}Register{{/linkTo}}</li>
                    <li>{{#linkTo route='login'}}Login{{/linkTo}}</li>
                  {{/if}}
                </ul>
            </div>
        </div>
    </nav>
</template>
