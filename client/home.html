    <h1>We are Catholics who worship in the Iford locality of Bournemouth.</h1>
    <br />
    <h2>Greetings. Iford Parish hosts three Catholic communities:</h2>
    <ol>
        <li>Parish of St Thomas More, in the Diocese of Portsmouth, Avon-Stour Pastoral Area</li>
        <li>Bournemouth Ordinariate Mission, in the Personal Ordinariate of Our Lady of Walsingham</li>
        <li>Kerala Catholic Community, including members of the Syro-Malabar and Syro-Malankara Catholic Churches</li>
    </ol>
    <br />
    Here are our Masses and other Liturgies occurring on a monthly basis:
    <ol>
        <li>Roman Rite (the Ordinary Form of Pope Paul VI, i.e., <i>Novus Ordo</i>)</li>
        <ul>
            <li>Saturdays at 18.00 hrs: First Mass of Sunday (with hymns), preceded by Confessions a half-hour before Mass.</li>
            <li>Sundays at 09.30 hrs: Principal Mass (sung), with Children's Liturgy when Dorset schools in session.</li>
            <li>Mondays: No services (Parish Priest's day off)</li>
            <li>Tuesdays at 09.30 hrs: Weekday Mass, followed on <b>first</b> Tuesday by Exposition and Adoration of the Blessed Sacrament</li>
            <li>Thursdays at 09.30 hrs: Weekday Mass</li>
            <li>Fridays at 09.30 hrs: Weekday Mass, followed on <b>second</b> Friday in month by Toddler Group</li>
        </ul>
        <li>Ordinariate Use</li>
        <ul>
            <li>Sundays at 11.15 hrs: High Mass</li>
            <li>Sundays (last in month) 16.30 hrs: Choral Evensong with Solemn Benediction on last Sunday in month, preceded by open choir rehearsal</li>
            <li>Wednesday at 10.30 hrs: Low Mass (with Homily)</li>
        </ul>
        <li>Chaldean / East Syrian Rite ()</li>
        <ul>
            <li>First Sundays at 16.00 hrs</li>
        </ul>
    </ol>
